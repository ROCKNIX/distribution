name: Build nightly
on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:
  workflow_call:

jobs:
  build-docker:
    name: Docker
    uses: ./.github/workflows/build-docker-image.yml

  build-devices:
    name: Build Devices
    needs: build-docker
    strategy:
      fail-fast: false
      matrix:
        include:
          - device: RK3326
            project: Rockchip
          - device: RK3399
            project: Rockchip
          - device: RK3566
            project: Rockchip
          - device: RK3588
            project: Rockchip
          - device: S922X
            project: Amlogic
          - device: H700
            project: Allwinner
          - device: SD865
            project: Qualcomm
    uses: ./.github/workflows/build-device.yml
    with:
      PROJECT: ${{ matrix.project }}
      DEVICE: ${{ matrix.device }}

  rerun-failed-jobs:
    if: failure() && fromJSON(github.run_attempt) < 3
    needs: build-devices
    runs-on: ubuntu-24.04
    steps:
      - env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run retry-workflow.yml -F run_id=${{ github.run_id }}
